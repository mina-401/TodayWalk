<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>런닝 코스</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- 상단 검색바 -->
  <div id="header">
    <div class="logo">RUN</div>
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="출발지를 검색하세요">
      <button id="btn-search">검색</button>
    </div>
    <button id="btn-locate">📍</button>
  </div>

  <!-- 지도 -->
  <div id="map"></div>
  <div id="map-hint">지도를 클릭해 경유지를 추가하세요</div>

  <!-- 하단 패널 -->
  <div id="panel">

    <!-- 통계 -->
    <div id="stats">
      <div class="stat-card">
        <span class="stat-label">거리</span>
        <span class="stat-value"><span id="stat-distance">0.0</span><em>km</em></span>
      </div>
      <div class="stat-card">
        <span class="stat-label">시간</span>
        <span class="stat-value"><span id="stat-time">0</span><em>분</em></span>
      </div>
      <div class="stat-card">
        <span class="stat-label">칼로리</span>
        <span class="stat-value"><span id="stat-cal">0</span><em>kcal</em></span>
      </div>
      <div class="stat-card">
        <span class="stat-label">페이스</span>
        <span class="stat-value"><span id="stat-pace">-</span><em>/km</em></span>
      </div>
    </div>

    <!-- 코스 목록 -->
    <div id="course-list-wrap">
      <div class="panel-title">코스</div>
      <ul id="course-list">
        <li class="course-item empty">출발지를 검색하세요</li>
      </ul>
    </div>

    <!-- 버튼 -->
    <div id="panel-actions">
      <button id="btn-reset">초기화</button>
      <button id="btn-save">코스 저장</button>
    </div>

  </div>

  <div id="status"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
